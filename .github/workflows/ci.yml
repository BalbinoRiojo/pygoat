name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  # ======================= BANDIT SAST =======================
  bandit_scan:
    name: Bandit SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit

      # Generar JSON
      - name: Run Bandit (JSON)
        run: bandit -f json -o sast-bandit.json -lll -iii -r . || true

      # Convertir JSON a SARIF con Python (en una línea para evitar errores YAML)
      - name: Convert JSON to SARIF
        run: |
          python -c "
          import json, os
          sarif = {'version': '2.1.0', 'runs': [{'tool': {'driver': {'name': 'Bandit'}}, 'results': []}]}
          if os.path.exists('sast-bandit.json') and os.path.getsize('sast-bandit.json') > 0:
              with open('sast-bandit.json') as f:
                  data = json.load(f)
              for r in data.get('results', []):
                  level = 'error' if r.get('issue_severity') == 'HIGH' else ('warning' if r.get('issue_severity') == 'MEDIUM' else 'note')
                  sarif['runs'][0]['results'].append({
                      'ruleId': r.get('test_name', 'unknown'),
                      'message': {'text': r.get('issue_text', '')},
                      'locations': [{'physicalLocation': {'artifactLocation': {'uri': r.get('filename', '')}, 'region': {'startLine': r.get('line_number', 1)}}}],
                      'level': level
                  })
          with open('bandit-output.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print(f'Created bandit-output.sarif with {len(sarif[\"runs\"][0][\"results\"])} results')
          "

      # Subir artefactos
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-json
          path: sast-bandit.json
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif

      # Subir a Security tab
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  # ======================= SEMGREP SAST =======================
  semgrep_scan:
    name: Semgrep SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (JSON)
        run: semgrep scan --severity=ERROR --severity=WARNING --json --output=sast-semgrep.json || true
      - name: Run Semgrep (SARIF)
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep-output.sarif || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: sast-semgrep.json
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  # ======================= DOCKER BUILD + SCOUT =======================
  build_image:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.REPO_PWD }}
      - name: Build Docker Image
        run: docker build -t ${{ secrets.REPO_USER }}/pygoat:latest .
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          dockerhub-user: ${{ secrets.REPO_USER }}
          dockerhub-password: ${{ secrets.REPO_PWD }}
          command: quickview
          image: ${{ secrets.REPO_USER }}/pygoat:latest
          only-severities: critical,high
