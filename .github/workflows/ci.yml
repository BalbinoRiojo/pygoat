name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  bandit-sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Acción oficial de Bandit que genera SARIF automáticamente
      - name: Run Bandit
        uses: advanced-security/bandit-sarif@v1
        with:
          path: .
          recursive: true
          severity: MEDIUM,HIGH   # Omite LOW
          confidence: MEDIUM,HIGH # Omite LOW
      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: results.sarif

  semgrep-sast:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output semgrep-output.sarif || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pygoat:latest .
      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKER_USERNAME }}/pygoat:latest
