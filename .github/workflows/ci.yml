name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  # ======================= BANDIT SAST =======================
  bandit_scan:
    name: Bandit SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Instalar Bandit desde GitHub (última versión con soporte SARIF)
      - name: Install Bandit from source
        run: pip install git+https://github.com/PyCQA/bandit.git

      # Generar JSON
      - name: Run Bandit (JSON)
        run: bandit -f json -o sast-bandit.json -lll -iii -r . || true

      # Generar SARIF (intentar con la versión instalada)
      - name: Run Bandit (SARIF)
        id: bandit_sarif
        run: |
          bandit -f sarif -o bandit-output.sarif -lll -iii -r . || true
          if [ ! -f bandit-output.sarif ]; then
            echo "Bandit SARIF generation failed. Creating from JSON."
            # Instalar jq para procesar JSON
            sudo apt-get update && sudo apt-get install -y jq
            # Crear un SARIF básico a partir del JSON (estructura mínima)
            jq -n --slurpfile results sast-bandit.json '{
              version: "2.1.0",
              runs: [
                {
                  tool: { driver: { name: "Bandit" } },
                  results: ($results[] | .results[]? // []) | map({
                    ruleId: .test_name,
                    message: { text: .issue_text },
                    locations: [{ physicalLocation: { artifactLocation: { uri: .filename }, region: { startLine: .line_number } } }],
                    severity: if .issue_severity == "HIGH" then "error" elif .issue_severity == "MEDIUM" then "warning" else "note" end
                  })
                }
              ]
            }' > bandit-output.sarif
          fi
          # Mostrar tamaño para depuración
          ls -la bandit-output.sarif

      # Subir artefactos
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-json
          path: sast-bandit.json
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif

      # Subir a Security tab
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  # ======================= SEMGREP SAST =======================
  semgrep_scan:
    name: Semgrep SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (JSON)
        run: semgrep scan --severity=ERROR --severity=WARNING --json --output=sast-semgrep.json || true
      - name: Run Semgrep (SARIF)
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep-output.sarif || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: sast-semgrep.json
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  # ======================= DOCKER BUILD + SCOUT =======================
  build_image:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.REPO_PWD }}
      - name: Build Docker Image
        run: docker build -t ${{ secrets.REPO_USER }}/pygoat:latest .
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          dockerhub-user: ${{ secrets.REPO_USER }}
          dockerhub-password: ${{ secrets.REPO_PWD }}
          command: quickview
          image: ${{ secrets.REPO_USER }}/pygoat:latest
          only-severities: critical,high
