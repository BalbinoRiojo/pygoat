name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  # ======================= BANDIT SAST =======================
  bandit_scan:
    name: Bandit SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Instalar la versión más reciente de Bandit (soporta SARIF)
      - name: Install Bandit
        run: pip install --upgrade bandit

      # Generar JSON (para comparar)
      - name: Run Bandit (JSON)
        run: bandit -f json -o sast-bandit.json -lll -iii -r . || true

      # Generar SARIF (para Security tab) - ahora sí funciona
      - name: Run Bandit (SARIF)
        run: bandit -f sarif -o bandit-output.sarif -lll -iii -r . || true

      # Subir artefactos
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-json
          path: sast-bandit.json
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif

      # Subir a Security tab
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  # ======================= SEMGREP SAST (en paralelo) =======================
  semgrep_scan:
    name: Semgrep SAST (JSON + SARIF)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Generar JSON
      - name: Run Semgrep (JSON)
        run: semgrep scan --severity=ERROR --severity=WARNING --json --output=sast-semgrep.json || true

      # Generar SARIF
      - name: Run Semgrep (SARIF)
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep-output.sarif || true

      # Subir artefactos
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: sast-semgrep.json
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif

      # Subir a Security tab
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  # ======================= DOCKER BUILD + SCOUT =======================
  build_image:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.REPO_PWD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.REPO_USER }}/pygoat:latest .

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          dockerhub-user: ${{ secrets.REPO_USER }}
          dockerhub-password: ${{ secrets.REPO_PWD }}
          command: quickview
          image: ${{ secrets.REPO_USER }}/pygoat:latest
          only-severities: critical,high
          # sarif-file: scout-report.sarif  # Comentado porque no siempre se genera

      # Subir artefacto solo si existe
      - name: Upload Scout SARIF if exists
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-scout-findings
          path: scout-report.sarif
        continue-on-error: true
