name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Permisos necesarios para subir los resultados SARIF a la pestaña Security
permissions:
  security-events: write

jobs:
  # ============================================================
  # JOB 1: SAST con Bandit (genera SARIF y sube a Security)
  # ============================================================
  bandit-sast:
    runs-on: ubuntu-latest
    # No falla aunque encuentre vulnerabilidades (código 2)
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      # Escaneo con Bandit en formato SARIF, omitiendo severity/confidence LOW
      - name: Run Bandit Scan (SARIF)
        run: bandit -f sarif -o bandit-output.sarif -lll -iii -r .

      # Subir el reporte SARIF como artefacto descargable
      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif

      # Subir el reporte a la pestaña Security de GitHub
      - name: Upload Bandit SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  # ============================================================
  # JOB 2: SAST con Semgrep (en paralelo con Bandit)
  # ============================================================
  semgrep-sast:
    runs-on: ubuntu-latest
    # Usar el contenedor oficial de Semgrep
    container:
      image: returntocorp/semgrep:latest
    # No falla aunque encuentre vulnerabilidades
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Escaneo con Semgrep: solo severidades ERROR y WARNING, formato SARIF
      # El '|| true' evita que el job falle por código de salida distinto de 0
      - name: Run Semgrep Scan (SARIF)
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output semgrep-output.sarif || true

      # Subir el reporte SARIF como artefacto
      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif

      # Subir el reporte a la pestaña Security de GitHub
      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  # ============================================================
  # JOB 3: Construcción de imagen Docker y análisis con Docker Scout
  # ============================================================
  docker-build-and-scan:
    runs-on: ubuntu-latest
    # Espera a que ambos análisis SAST terminen (aunque hayan fallado con continue-on-error)
    needs: [bandit-sast, semgrep-sast]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inicio de sesión en Docker Hub (opcional, requiere secrets)
      # Si no quieres subir la imagen, comenta este bloque
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Construir la imagen Docker
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pygoat:latest .

      # Analizar la imagen con Docker Scout
      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKER_USERNAME }}/pygoat:latest
