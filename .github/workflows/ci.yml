name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutar el workflow manualmente desde la pestaña de Actions

jobs:
  # Job 1: Análisis SAST con Bandit
  bandit-sast:
    runs-on: ubuntu-latest
    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Python (Bandit es una herramienta de Python)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # O la versión que necesite pygoat

      # 3. Instalar Bandit
      - name: Install Bandit
        run: pip install bandit

      # 4. Ejecutar Bandit
      #    -f json: Guarda la salida en formato JSON
      #    -o sast-bandit.json: Define el nombre del archivo de salida
      #    -lll: Muestra solo issues con severidad MEDIA o ALTA (omite las bajas)
      #    -iii: Muestra solo issues con confianza MEDIA o ALTA (omite las bajas)
      #    -r .: Escanea de forma recursiva el directorio actual
      - name: Run Bandit Scan
        run: bandit -f json -o sast-bandit.json -lll -iii -r .

      # 5. Subir el reporte como un artefacto del workflow
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: sast-bandit.json


            # Job 2: Construcción y análisis de imagen Docker
  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: bandit-sast # Este job depende del éxito del job 'bandit-sast'
    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Iniciar sesión en Docker Hub (Opcional pero recomendado)
      #    Necesitas crear los secrets DOCKER_USERNAME y DOCKER_TOKEN en tu repo.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Construir la imagen Docker
      #    Le damos un nombre y una etiqueta (tag) a nuestra imagen.
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pygoat:latest .

      # 4. Analizar la imagen con Docker Scout
      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKER_USERNAME }}/pygoat:latest
          only-severities: critical,high # Opcional: Muestra solo vulnerabilidades críticas o altas



  # Job 3: Análisis SAST con Semgrep (en paralelo con Bandit)
  semgrep-sast:
    runs-on: ubuntu-latest
    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Ejecutar Semgrep CI
      #    La acción oficial se encarga de instalar y ejecutar Semgrep.
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          # Configuración para generar un reporte JSON y omitir issues de baja severidad/confianza
          config: >-
            p/owasp-top-ten
            p/python
          # Genera el reporte en la ruta especificada
          generate-json-sarif: sast-semgrep.json
