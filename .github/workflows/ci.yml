name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  bandit-sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      
      - name: Run Bandit and ensure SARIF file
        run: |
          bandit -f sarif -o bandit-output.sarif -lll -iii -r . || echo "Bandit exit code: $?"
          if [ ! -f bandit-output.sarif ]; then
            echo "WARNING: bandit did not create SARIF file. Creating empty one."
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Bandit"}},"results":[]}]}' > bandit-output.sarif
          else
            echo "SARIF file created successfully"
            ls -la bandit-output.sarif
          fi
      
      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif
      
      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  semgrep-sast:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep scan --severity=ERROR --severity=WARNING --sarif --output semgrep-output.sarif || echo "Semgrep exit code: $?"
          if [ ! -f semgrep-output.sarif ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep"}},"results":[]}]}' > semgrep-output.sarif
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast]
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "ERROR: Dockerfile not found in repository root"
            ls -la
            exit 1
          fi
          echo "Dockerfile found"
      
      - name: Build Docker image with verbose output
        run: docker build -t pygoat:latest . --progress=plain
      
      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: pygoat:latest
