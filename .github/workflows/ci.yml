name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  # ============================================================
  # JOB 1: SAST con Bandit (formato SARIF)
  # ============================================================
  bandit-sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan (SARIF)
        run: bandit -f sarif -o bandit-output.sarif -lll -iii -r . || true

      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif

      - name: Upload Bandit SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-output.sarif

  # ============================================================
  # JOB 2: SAST con Semgrep (formato SARIF)
  # ============================================================
  semgrep-sast:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan (SARIF)
        run: semgrep scan --severity=ERROR --severity=WARNING --sarif --output semgrep-output.sarif || true

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-output.sarif

  # ============================================================
  # JOB 3: Construcción de imagen Docker y análisis con Docker Scout
  # ============================================================
  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Autenticación en Docker Hub con secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pygoat:latest .

      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKER_USERNAME }}/pygoat:latest
