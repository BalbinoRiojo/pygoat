name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bandit-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      - run: bandit -f sarif -o bandit-output.sarif -lll -iii -r .
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-output.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-output.sarif

  semgrep-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install semgrep
      - run: semgrep ci --config=p/owasp-top-ten --config=p/python --sarif --output semgrep-output.sarif
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-output.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-output.sarif

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pygoat:latest .
      - name: Scan image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKER_USERNAME }}/pygoat:latest
